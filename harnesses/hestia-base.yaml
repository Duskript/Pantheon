schema_version: 1
name: Hestia
type: subsystem
driver: script

routing:
  - if: health_check_passes
    then: log(kronos, status=healthy)
  - if: service_degraded
    then: alert(zeus, reason="service_degraded") → log(kronos, status=degraded)
  - if: service_down
    then: alert(zeus, reason="service_down") → log(kronos, status=down)

guardrails:
  hard_stops:
    - Never modify system state — monitor only
    - Never expose credentials or tokens in health check logs
    - Never suppress a degraded or down status

failure_behavior:
  on_ambiguity: skip_and_log
  on_out_of_scope: skip_and_log
  on_hard_stop: halt_and_log
  on_mnemosyne_unavailable: proceed_without_corpus_note_limitation
