<svg viewBox="0 0 1100 920" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      text { font-family: 'JetBrains Mono', 'Consolas', 'Courier New', monospace; }
    </style>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee" />
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa" />
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24" />
    </marker>
    <marker id="arrow-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrow-bidi-left" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#fb923c" />
    </marker>
    <marker id="arrow-bidi-right" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c" />
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background Grid -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- LAYER 1: YOU (User Interface Layer) -->

  <rect x="400" y="30" width="300" height="54" rx="8" fill="#082244" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="550" y="52" fill="white" font-size="14" font-weight="700" text-anchor="middle" letter-spacing="1">YOU</text>
  <text x="550" y="70" fill="#22d3ee" font-size="9" text-anchor="middle">Web UI · Telegram · Discord · Mobile</text>

  <line x1="550" y1="84" x2="550" y2="114" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>

  <!-- ================================================================ -->
  <!-- LAYER 2: PANTHEON ENGINE                                          -->
  <!-- ================================================================ -->

  <rect x="50" y="118" width="1000" height="140" rx="10" fill="rgba(6, 78, 59, 0.3)" stroke="#34d399" stroke-width="1.5"/>
  <text x="550" y="142" fill="#34d399" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="2">PANTHEON ENGINE</text>

  <line x1="70" y1="150" x2="1030" y2="150" stroke="#34d399" stroke-width="0.5" opacity="0.3"/>

  <rect x="75" y="160" width="470" height="85" rx="6" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="310" y="178" fill="#6ee7b7" font-size="10" font-weight="600" text-anchor="middle">Platform Gateways</text>
  <text x="95" y="197" fill="#94a3b8" font-size="8">Telegram  ·  Discord  ·  Slack  ·  WhatsApp</text>
  <text x="95" y="213" fill="#94a3b8" font-size="8">Signal  ·  Email  ·  SMS  ·  Matrix  ·  + more</text>
  <text x="95" y="231" fill="#6ee7b7" font-size="7">Same Gods, same personality, on any platform</text>

  <rect x="555" y="160" width="470" height="85" rx="6" fill="rgba(6, 78, 59, 0.2)" stroke="#34d399" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="790" y="178" fill="#6ee7b7" font-size="10" font-weight="600" text-anchor="middle">Core Systems</text>
  <text x="575" y="197" fill="#94a3b8" font-size="8">Skills  ·  Memory (short + long term)  ·  Cron</text>
  <text x="575" y="213" fill="#94a3b8" font-size="8">Webhooks  ·  Sub-agents  ·  Web Search  ·  Browser</text>
  <text x="575" y="231" fill="#6ee7b7" font-size="7">File exec  ·  Code exec  ·  Credential pools</text>

  <line x1="310" y1="258" x2="310" y2="288" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <line x1="790" y1="258" x2="790" y2="288" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>

  <!-- ================================================================ -->
  <!-- LAYER 3: GODS + ATHENAEUM (two-column)                            -->
  <!-- ================================================================ -->

  <rect x="50" y="292" width="460" height="340" rx="10" fill="rgba(251, 146, 60, 0.12)" stroke="none"/>
  <rect x="50" y="292" width="460" height="340" rx="10" fill="transparent" stroke="#fb923c" stroke-width="1.5"/>
  <text x="280" y="318" fill="#fb923c" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="2">THE GODS</text>
  <text x="280" y="334" fill="#94a3b8" font-size="8" text-anchor="middle">Specialized AI agents, each with their own domain</text>

  <rect x="80" y="350" width="185" height="58" rx="6" fill="rgba(30, 41, 59, 0.6)" stroke="#fb923c" stroke-width="1"/>
  <text x="172" y="372" fill="white" font-size="11" font-weight="600" text-anchor="middle">Hermes</text>
  <text x="172" y="390" fill="#94a3b8" font-size="8" text-anchor="middle">Messenger &amp; Gatekeeper</text>

  <rect x="295" y="350" width="185" height="58" rx="6" fill="rgba(30, 41, 59, 0.6)" stroke="#fb923c" stroke-width="1"/>
  <text x="387" y="372" fill="white" font-size="11" font-weight="600" text-anchor="middle">Thoth</text>
  <text x="387" y="390" fill="#94a3b8" font-size="8" text-anchor="middle">Research &amp; Knowledge</text>

  <rect x="80" y="425" width="185" height="58" rx="6" fill="rgba(30, 41, 59, 0.6)" stroke="#fb923c" stroke-width="1"/>
  <text x="172" y="447" fill="white" font-size="11" font-weight="600" text-anchor="middle">Hephaestus</text>
  <text x="172" y="465" fill="#94a3b8" font-size="8" text-anchor="middle">Builder &amp; Engineer</text>

  <rect x="295" y="425" width="185" height="58" rx="6" fill="rgba(30, 41, 59, 0.6)" stroke="#fb923c" stroke-width="1"/>
  <text x="387" y="447" fill="white" font-size="11" font-weight="600" text-anchor="middle">Caduceus</text>
  <text x="387" y="465" fill="#94a3b8" font-size="8" text-anchor="middle">Health &amp; Medical</text>

  <rect x="80" y="500" width="185" height="58" rx="6" fill="rgba(30, 41, 59, 0.6)" stroke="#fb923c" stroke-width="1"/>
  <text x="172" y="522" fill="white" font-size="11" font-weight="600" text-anchor="middle">Marvin</text>
  <text x="172" y="540" fill="#94a3b8" font-size="8" text-anchor="middle">Debugging &amp; Analysis</text>

  <rect x="295" y="500" width="185" height="58" rx="6" fill="rgba(30, 41, 59, 0.6)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="387" y="522" fill="white" font-size="11" font-weight="600" text-anchor="middle">+ You</text>
  <text x="387" y="540" fill="#94a3b8" font-size="8" text-anchor="middle">Soul Forge — create your own</text>

  <rect x="590" y="292" width="460" height="340" rx="10" fill="rgba(76, 29, 149, 0.12)" stroke="none"/>
  <rect x="590" y="292" width="460" height="340" rx="10" fill="transparent" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="820" y="318" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="2">THE ATHENAEUM</text>
  <text x="820" y="334" fill="#94a3b8" font-size="8" text-anchor="middle">Shared brain — every God reads from and writes to it</text>

  <rect x="615" y="355" width="410" height="48" rx="6" fill="rgba(76, 29, 149, 0.15)" stroke="#a78bfa" stroke-width="0.5"/>
  <circle cx="635" cy="372" r="3" fill="#a78bfa"/>
  <text x="648" y="376" fill="white" font-size="10" font-weight="500">Knowledge Files</text>
  <text x="648" y="392" fill="#94a3b8" font-size="8">Markdown, PDFs, images, audio — auto-categorized</text>

  <rect x="615" y="415" width="410" height="48" rx="6" fill="rgba(76, 29, 149, 0.15)" stroke="#a78bfa" stroke-width="0.5"/>
  <circle cx="635" cy="432" r="3" fill="#a78bfa"/>
  <text x="648" y="436" fill="white" font-size="10" font-weight="500">Vector Search</text>
  <text x="648" y="452" fill="#94a3b8" font-size="8">ChromaDB — semantic search across everything you've saved</text>

  <rect x="615" y="475" width="410" height="48" rx="6" fill="rgba(76, 29, 149, 0.15)" stroke="#a78bfa" stroke-width="0.5"/>
  <circle cx="635" cy="492" r="3" fill="#a78bfa"/>
  <text x="648" y="496" fill="white" font-size="10" font-weight="500">Entity Relationship Graph</text>
  <text x="648" y="512" fill="#94a3b8" font-size="8">Connects ideas, people, projects across Codices</text>

  <rect x="615" y="535" width="410" height="48" rx="6" fill="rgba(76, 29, 149, 0.15)" stroke="#a78bfa" stroke-width="0.5"/>
  <circle cx="635" cy="552" r="3" fill="#a78bfa"/>
  <text x="648" y="556" fill="white" font-size="10" font-weight="500">Intake Pipeline</text>
  <text x="648" y="572" fill="#94a3b8" font-size="8">Drop in links, documents, photos — ingested, classified, embedded</text>

  <text x="615" y="605" fill="#c4b5fd" font-size="8">Lives on your machine. You own every byte. Never trains on your data.</text>

  <line x1="510" y1="462" x2="588" y2="462" stroke="#fb923c" stroke-width="1.5" marker-start="url(#arrow-bidi-left)" marker-end="url(#arrow-bidi-right)"/>
  <text x="549" y="455" fill="#fb923c" font-size="7" text-anchor="middle">All Gods</text>
  <text x="549" y="478" fill="#fb923c" font-size="7" text-anchor="middle">Read / Write</text>

  <path d="M 280 632 L 280 650 Q 280 660 290 660 L 810 660 Q 820 660 820 650 L 820 632" fill="none" stroke="#fb923c" stroke-width="1.5"/>
  <line x1="310" y1="632" x2="310" y2="655" stroke="none"/>
  <path d="M 310 632 L 310 655 Q 310 665 320 665 L 780 665 Q 790 665 790 655 L 790 632" fill="none" stroke="#fb923c" stroke-width="1.5"/>
  <line x1="550" y1="665" x2="550" y2="695" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-violet)"/>
  <text x="560" y="682" fill="#94a3b8" font-size="8">Query routed to chosen model</text>

  <!-- ================================================================ -->
  <!-- LAYER 4: MODEL PROVIDERS (DIRECT)                                -->
  <!-- ================================================================ -->

  <rect x="150" y="700" width="800" height="75" rx="10" fill="rgba(120, 53, 15, 0.25)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="550" y="725" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">Model Providers — Direct Routing</text>
  <text x="550" y="745" fill="#d97706" font-size="10" text-anchor="middle">OpenAI · Anthropic · Ollama · OpenRouter · DeepSeek · Google Gemini · OpenCode Go</text>
  <text x="550" y="762" fill="#92400e" font-size="9" text-anchor="middle">No proxy · Direct connections · Swap models per-God or mid-session</text>

  <line x1="550" y1="775" x2="550" y2="810" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

  <!-- ================================================================ -->
  <!-- LAYER 5: YOUR MACHINE                                             -->
  <!-- ================================================================ -->

  <rect x="200" y="815" width="700" height="60" rx="10" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="550" y="840" fill="white" font-size="13" font-weight="700" text-anchor="middle" letter-spacing="1">YOUR MACHINE</text>
  <text x="550" y="860" fill="#94a3b8" font-size="9" text-anchor="middle">~3.5 GB RAM total  ·  Headless server  ·  Linux / macOS / WSL</text>

  <!-- ================================================================ -->
  <!-- LEGEND                                                            -->
  <!-- ================================================================ -->

  <text x="50" y="870" fill="white" font-size="10" font-weight="600">Legend</text>

  <rect x="50" y="878" width="12" height="8" rx="2" fill="rgba(8, 51, 68, 0.4)" stroke="#22d3ee" stroke-width="1"/>
  <text x="68" y="886" fill="#94a3b8" font-size="8">User Interface</text>

  <rect x="155" y="878" width="12" height="8" rx="2" fill="rgba(6, 78, 59, 0.4)" stroke="#34d399" stroke-width="1"/>
  <text x="173" y="886" fill="#94a3b8" font-size="8">Engine / Infrastructure</text>

  <rect x="305" y="878" width="12" height="8" rx="2" fill="rgba(251, 146, 60, 0.4)" stroke="#fb923c" stroke-width="1"/>
  <text x="323" y="886" fill="#94a3b8" font-size="8">Agents (Gods)</text>

  <rect x="425" y="878" width="12" height="8" rx="2" fill="rgba(76, 29, 149, 0.4)" stroke="#a78bfa" stroke-width="1"/>
  <text x="443" y="886" fill="#94a3b8" font-size="8">Knowledge Store</text>

  <rect x="560" y="878" width="12" height="8" rx="2" fill="rgba(120, 53, 15, 0.3)" stroke="#fbbf24" stroke-width="1"/>
  <text x="578" y="886" fill="#94a3b8" font-size="8">Model Proxy</text>

  <rect x="680" y="878" width="12" height="8" rx="2" fill="rgba(30, 41, 59, 0.5)" stroke="#94a3b8" stroke-width="1"/>
  <text x="698" y="886" fill="#94a3b8" font-size="8">Hardware</text>
</svg>
