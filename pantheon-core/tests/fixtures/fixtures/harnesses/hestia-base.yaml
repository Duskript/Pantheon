schema_version: 1
name: Hestia
type: subsystem
driver: script

routing:
  - if: health_check_passes
    then: log(kronos, status=healthy)
  - if: health_check_fails
    then: alert(zeus, reason="service_degraded")

guardrails:
  hard_stops:
    - Never modify system state — monitor only
    - Never expose credentials or tokens in logs

failure_behavior:
  on_ambiguity: skip_and_log
  on_out_of_scope: skip_and_log
  on_hard_stop: halt_and_log
  on_mnemosyne_unavailable: proceed_without_corpus_note_limitation
